version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: project-b-pgvector
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop123
      POSTGRES_DB: acmera_kb
    ports:
      - "5434:5432"   # 5434 on host — avoids conflict with Project A (5433)
    volumes:
      - pgdata_b:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: project-b-redis
    ports:
      - "6380:6379"   # 6380 on host — avoids conflict with any local Redis on 6379
    volumes:
      - redisdata_b:/data

  app:
    build: .
    container_name: project-b-app
    env_file: .env
    environment:
      PG_HOST: pgvector
      PG_PORT: "5432"    # internal: container-to-container, always 5432
      REDIS_HOST: redis
      REDIS_PORT: "6379" # internal: container-to-container
    ports:
      - "8081:8080"      # 8081 on host — avoids conflict with Project A (8080)
    depends_on:
      - pgvector
      - redis

volumes:
  pgdata_b:
  redisdata_b:
