AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Acmera Support Agent — ECS Fargate + ElastiCache Redis + ALB (shares Project A RDS)

# ── Parameters ──────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  DBHost:
    Type: String
    Description: Project A RDS endpoint — shared corpus (acmera_kb, pgvector)

  DBPort:
    Type: String
    Default: "5432"
    Description: Project A RDS port (default 5432)

  LangfuseHost:
    Type: String
    Default: https://cloud.langfuse.com

  # ARNs of Project A's existing Secrets Manager secrets — shared, not duplicated
  ProjectADBSecretArn:
    Type: String
    Description: ARN of Project A's acmera/dev/db secret (contains db password)

  ProjectAAppSecretArn:
    Type: String
    Description: ARN of Project A's acmera/dev/app secret (contains OpenAI, Langfuse, Cohere keys)

# ── VPC + Networking ─────────────────────────────────────────────────────────
Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16          # 10.1.x — different from Project A (10.0.x)
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: !Sub "acmera-support-${Environment}"}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public subnets (ALB + ECS tasks — Fargate with public IP avoids NAT cost in dev)
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.1.0/24
      AvailabilityZone: ap-south-1a
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: acmera-support-public-a}]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.2.0/24
      AvailabilityZone: ap-south-1b
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: acmera-support-public-b}]

  # Private subnets (RDS + ElastiCache Redis)
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.11.0/24
      AvailabilityZone: ap-south-1a
      Tags: [{Key: Name, Value: acmera-support-private-a}]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.12.0/24
      AvailabilityZone: ap-south-1b
      Tags: [{Key: Name, Value: acmera-support-private-b}]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

# ── Security Groups ──────────────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - allow HTTP from anywhere
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks - allow traffic from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Redis - allow from ECS tasks only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref ECSSecurityGroup

# ── Secrets Manager ──────────────────────────────────────────────────────────
# Project B reuses Project A's secrets — no duplicate secrets created.
# ProjectADBSecretArn  → password for the shared RDS
# ProjectAAppSecretArn → OpenAI, Langfuse, Cohere keys (identical in both projects)

# ── ElastiCache Redis ────────────────────────────────────────────────────────

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Acmera Support Redis subnet group
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub "acmera-support-${Environment}"
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: cache.t3.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt CacheSecurityGroup.GroupId

# ── IAM ──────────────────────────────────────────────────────────────────────

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref ProjectADBSecretArn
                  - !Ref ProjectAAppSecretArn

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole

# ── CloudWatch Logs ──────────────────────────────────────────────────────────

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/acmera-support-${Environment}"
      RetentionInDays: 7

# ── ECS ──────────────────────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "acmera-support-${Environment}"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "acmera-support-${Environment}"
      Cpu: "1024"                  # 1024 vCPU — required for 3072 MB memory (Fargate constraint)
      Memory: "3072"               # 3 GB — LangGraph state + concurrent LLM calls are heavier
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: acmera-support
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/acmera-support-dev:latest"
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: PG_HOST
              Value: !Ref DBHost   # Project A RDS — shared corpus
            - Name: PG_PORT
              Value: !Ref DBPort
            - Name: PG_USER
              Value: workshop
            - Name: PG_DATABASE
              Value: acmera_kb
            - Name: LANGFUSE_HOST
              Value: !Ref LangfuseHost
            - Name: REDIS_HOST
              Value: !Sub "${RedisCluster.RedisEndpoint.Address}"
            - Name: REDIS_PORT
              Value: !Sub "${RedisCluster.RedisEndpoint.Port}"
          Secrets:
            - Name: PG_PASSWORD
              ValueFrom: !Sub "${ProjectADBSecretArn}:password::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${ProjectAAppSecretArn}:openai_api_key::"
            - Name: LANGFUSE_PUBLIC_KEY
              ValueFrom: !Sub "${ProjectAAppSecretArn}:langfuse_public_key::"
            - Name: LANGFUSE_SECRET_KEY
              ValueFrom: !Sub "${ProjectAAppSecretArn}:langfuse_secret_key::"
            - Name: COHERE_API_KEY
              ValueFrom: !Sub "${ProjectAAppSecretArn}:cohere_api_key::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub "acmera-support-${Environment}"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
          SecurityGroups: [!Ref ECSSecurityGroup]
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: acmera-support
          ContainerPort: 8080
          TargetGroupArn: !Ref ALBTargetGroup

# ── Auto Scaling ─────────────────────────────────────────────────────────────

  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: ECSService
    Properties:
      MinCapacity: 1
      MaxCapacity: 3
      ResourceId: !Sub "service/${ECSCluster}/${ECSService.Name}"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"

  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "acmera-support-${Environment}-cpu60"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 60.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

# ── ALB ──────────────────────────────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "acmera-support-${Environment}"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups: [!Ref ALBSecurityGroup]
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "180"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "acmera-support-${Environment}"
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  APIEndpoint:
    Description: ALB DNS — curl /health, /query, /ingest (no ingest needed; corpus already in Project A RDS)
    Value: !Sub "http://${ALB.DNSName}"

  DBEndpoint:
    Description: Project A RDS endpoint in use (shared corpus)
    Value: !Ref DBHost

  RedisEndpoint:
    Description: ElastiCache Redis endpoint — wired via REDIS_HOST env var
    Value: !GetAtt RedisCluster.RedisEndpoint.Address

  ECRRepository:
    Description: ECR image URI used by the task definition
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/acmera-support-dev:latest"
